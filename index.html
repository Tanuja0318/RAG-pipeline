<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAG Chatbot</title>
  <style>
    /* ---------- Reset & Base ---------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---------- Header ---------- */
    header {
      background: #1a1d27;
      padding: 16px 24px;
      border-bottom: 1px solid #2a2d3e;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 600; color: #fff; }
    .badge {
      background: #2563eb;
      color: #fff;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 500;
    }

    /* ---------- Upload bar ---------- */
    .upload-bar {
      background: #1a1d27;
      padding: 10px 24px;
      border-bottom: 1px solid #2a2d3e;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .upload-bar label {
      cursor: pointer;
      background: #2a2d3e;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      transition: background 0.2s;
    }
    .upload-bar label:hover { background: #363a4f; }
    #file-input { display: none; }
    #upload-status { font-size: 13px; color: #6ee7b7; }
    #doc-list { font-size: 12px; color: #94a3b8; }

    /* ---------- Chat area ---------- */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ---------- Message bubbles ---------- */
    .msg { display: flex; gap: 12px; max-width: 780px; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .msg.user .avatar { background: #2563eb; }
    .msg.bot  .avatar { background: #7c3aed; }

    .bubble {
      background: #1e2130;
      border: 1px solid #2a2d3e;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 680px;
    }
    .msg.user .bubble { background: #1e3a5f; border-color: #2563eb44; }

    /* Source chips shown below bot answers */
    .sources { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
    .source-chip {
      background: #2a2d3e;
      border: 1px solid #3a3d52;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      color: #94a3b8;
    }

    /* Typing indicator */
    .typing span {
      display: inline-block;
      width: 7px; height: 7px;
      background: #94a3b8;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    /* ---------- Input bar ---------- */
    .input-bar {
      background: #1a1d27;
      padding: 16px 24px;
      border-top: 1px solid #2a2d3e;
      display: flex;
      gap: 10px;
    }
    #question {
      flex: 1;
      background: #2a2d3e;
      border: 1px solid #3a3d52;
      border-radius: 8px;
      padding: 12px 16px;
      color: #e0e0e0;
      font-size: 14px;
      resize: none;
      height: 48px;
      line-height: 1.4;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    #question:focus { border-color: #2563eb; }
    #send-btn {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #send-btn:hover { background: #1d4ed8; }
    #send-btn:disabled { background: #374151; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <span style="font-size:22px">🤖</span>
  <h1>RAG Chatbot</h1>
  <span class="badge">Powered by LangChain + ChromaDB</span>
</header>

<!-- Upload bar -->
<div class="upload-bar">
  <label for="file-input">📎 Upload Document</label>
  <input type="file" id="file-input" accept=".pdf,.txt" onchange="uploadFile(this)"/>
  <span id="upload-status"></span>
  <span id="doc-list">Loading documents…</span>
</div>

<!-- Chat messages -->
<div id="chat">
  <div class="msg bot">
    <div class="avatar">🤖</div>
    <div class="bubble">
      Hello! I'm your RAG chatbot. Upload a document above and ask me anything about it.
      I'll search through your documents and answer using only what's in them.
    </div>
  </div>
</div>

<!-- Input bar -->
<div class="input-bar">
  <textarea id="question" placeholder="Ask a question about your documents…"></textarea>
  <button id="send-btn" onclick="sendMessage()">➤</button>
</div>

<script>
  const API = "http://localhost:8000";  // Change to your server URL in production

  /* ---- Load document list on page load ---- */
  async function loadDocs() {
    try {
      const res = await fetch(`${API}/documents`);
      const data = await res.json();
      document.getElementById("doc-list").textContent =
        data.documents.length > 0
          ? "📄 Docs: " + data.documents.join(", ")
          : "No documents uploaded yet.";
    } catch {
      document.getElementById("doc-list").textContent = "Could not connect to server.";
    }
  }
  loadDocs();

  /* ---- Upload file ---- */
  async function uploadFile(input) {
    const file = input.files[0];
    if (!file) return;
    const status = document.getElementById("upload-status");
    status.textContent = "Uploading…";
    status.style.color = "#facc15";

    const form = new FormData();
    form.append("file", file);

    try {
      const res = await fetch(`${API}/upload`, { method: "POST", body: form });
      const data = await res.json();
      status.textContent = data.message || "Uploaded!";
      status.style.color = "#6ee7b7";
      loadDocs();
    } catch {
      status.textContent = "Upload failed. Is the server running?";
      status.style.color = "#f87171";
    }
  }

  /* ---- Send message ---- */
  async function sendMessage() {
    const input = document.getElementById("question");
    const question = input.value.trim();
    if (!question) return;

    // Add user message bubble
    addMessage(question, "user");
    input.value = "";
    document.getElementById("send-btn").disabled = true;

    // Show typing indicator
    const typingId = showTyping();

    try {
      const res = await fetch(`${API}/query`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question })
      });
      const data = await res.json();

      removeTyping(typingId);
      const answer = data.answer || data.detail || "Sorry, I could not get an answer.";
      const sources = data.sources || [];
      addMessage(answer, "bot", sources);
    } catch {
      removeTyping(typingId);
      addMessage("Error: Could not reach server. Is FastAPI running?", "bot");
    }

    document.getElementById("send-btn").disabled = false;
  }

  /* ---- Add a message bubble to chat ---- */
  function addMessage(text, role, sources = []) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = `msg ${role}`;

    // Sources chips (only for bot messages)
    let sourcesHTML = "";
    if (sources.length > 0) {
      const chips = sources.map(s =>
        `<div class="source-chip">📄 ${s.source} · p.${s.page}</div>`
      ).join("");
      sourcesHTML = `<div class="sources">${chips}</div>`;
    }

    div.innerHTML = `
      <div class="avatar">${role === "user" ? "👤" : "🤖"}</div>
      <div class="bubble">${text}${sourcesHTML}</div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;   // Auto scroll to bottom
  }

  /* ---- Typing indicator ---- */
  function showTyping() {
    const chat = document.getElementById("chat");
    const id = "typing-" + Date.now();
    const div = document.createElement("div");
    div.className = "msg bot";
    div.id = id;
    div.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble typing">
        <span></span><span></span><span></span>
      </div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    document.getElementById(id)?.remove();
  }

  /* ---- Press Enter to send (Shift+Enter for new line) ---- */
  document.getElementById("question").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
